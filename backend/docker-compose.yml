version: "3.9"

services:

  mongodb:
    image: mongo:7
    container_name: ptm-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - ./data:/data/db

  mongo-express:
    image: mongo-express
    container_name: ptm-mongo-ui
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      ME_CONFIG_MONGODB_SERVER: mongodb

  redis:
    image: redis:7-alpine
    container_name: ptm-redis
    restart: always
    ports:
      - "6379:6379"
    command: >
      redis-server --requirepass ${REDIS_PASSWORD:-ptmchat2026} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ptmchat2026}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-insight:
    image: redis/redisinsight:latest
    container_name: ptm-redis-ui
    restart: always
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
